<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080810">
  <title>Scanner — Control de Acceso</title>

  <!-- jsQR para leer QR desde la cámara -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      --bg:        #080810;
      --surface:   #0f0f1a;
      --border:    #1e1e35;
      --gold:      #c9a84c;
      --gold-dim:  #6b5520;
      --text:      #e8e8f0;
      --muted:     #55556a;
      --green:     #22c55e;
      --green-bg:  #052010;
      --red:       #ef4444;
      --red-bg:    #1a0505;
      --yellow:    #f59e0b;
      --yellow-bg: #1a1000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── PANTALLA DE CONFIGURACIÓN ── */
    #setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 32px 24px;
      gap: 24px;
    }

    .setup-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 5px;
      color: var(--gold);
      text-align: center;
    }

    .setup-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 3px;
      text-align: center;
      line-height: 1;
      color: var(--text);
    }

    .setup-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .setup-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .setup-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      outline: none;
      transition: border-color 0.2s;
    }

    .setup-input:focus {
      border-color: var(--gold-dim);
    }

    .setup-input::placeholder {
      color: var(--muted);
    }

    .btn-primary {
      width: 100%;
      background: var(--gold);
      color: #080810;
      border: none;
      border-radius: 10px;
      padding: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

    .setup-hint {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    /* ── PANTALLA PRINCIPAL DEL ESCÁNER ── */
    #scanner-screen {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .header-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--gold);
    }

    .header-counter {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }

    .counter-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .counter-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: var(--gold);
      line-height: 1;
    }

    /* Visor de cámara */
    .camera-wrapper {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #canvas { display: none; }

    /* Marco de escaneo animado */
    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(65vw, 240px);
      height: min(65vw, 240px);
    }

    .scan-corner {
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: var(--gold);
      border-style: solid;
    }

    .scan-corner.tl { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .scan-corner.tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .scan-corner.bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .scan-corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    .scan-line {
      position: absolute;
      left: 10px;
      right: 10px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      top: 0;
      animation: scan 2s ease-in-out infinite;
      box-shadow: 0 0 8px var(--gold);
    }

    @keyframes scan {
      0%, 100% { top: 10px; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      50% { top: calc(100% - 12px); }
    }

    .scan-overlay-text {
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    /* Barra oscura sobre la cámara */
    .camera-top-fade {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, rgba(8,8,16,0.7), transparent);
      pointer-events: none;
    }

    /* Estado de procesando */
    .processing-badge {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(201,168,76,0.15);
      border: 1px solid var(--gold-dim);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--gold);
      display: none;
      white-space: nowrap;
    }

    .processing-badge.visible { display: block; }

    /* ── PANEL DE RESULTADO ── */
    .result-panel {
      flex-shrink: 0;
      padding: 0 16px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .result-card {
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .result-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .result-card.success {
      background: var(--green-bg);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .result-card.error {
      background: var(--red-bg);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .result-card.warning {
      background: var(--yellow-bg);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .result-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .result-card.success .result-icon { background: rgba(34,197,94,0.15); }
    .result-card.error   .result-icon { background: rgba(239,68,68,0.15); }
    .result-card.warning .result-icon { background: rgba(245,158,11,0.15); }

    .result-info { flex: 1; min-width: 0; }

    .result-name {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-msg {
      font-size: 12px;
      margin-top: 3px;
    }

    .result-card.success .result-msg { color: var(--green); }
    .result-card.error   .result-msg { color: var(--red); }
    .result-card.warning .result-msg { color: var(--yellow); }

    .result-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Placeholder cuando no hay resultado */
    .result-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      gap: 8px;
      margin-top: 16px;
    }

    /* ── PANTALLA DE RESULTADO GRANDE (fullscreen) ── */
    #result-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px 32px;
      transform: scale(0.9);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #result-fullscreen.active {
      transform: scale(1);
      opacity: 1;
      pointer-events: all;
    }

    #result-fullscreen.success-fs { background: var(--green-bg); }
    #result-fullscreen.error-fs   { background: var(--red-bg); }
    #result-fullscreen.warning-fs { background: var(--yellow-bg); }

    .fs-icon {
      font-size: 96px;
      line-height: 1;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes pop {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }

    .fs-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
      text-align: center;
      color: var(--text);
    }

    .fs-msg {
      font-size: 15px;
      text-align: center;
      letter-spacing: 1px;
    }

    #result-fullscreen.success-fs .fs-msg { color: var(--green); }
    #result-fullscreen.error-fs   .fs-msg { color: var(--red); }
    #result-fullscreen.warning-fs .fs-msg { color: var(--yellow); }

    .fs-dismiss {
      margin-top: 12px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Barra de progreso auto-dismiss */
    .fs-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      border-radius: 0 2px 0 0;
      animation: progress-bar 3s linear forwards;
    }

    #result-fullscreen.success-fs .fs-progress { background: var(--green); }
    #result-fullscreen.error-fs   .fs-progress   { background: var(--red); }
    #result-fullscreen.warning-fs .fs-progress { background: var(--yellow); }

    @keyframes progress-bar {
      from { width: 100%; }
      to   { width: 0%; }
    }

    /* Sin conexión */
    .offline-badge {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--red);
      color: white;
      text-align: center;
      padding: 6px;
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 200;
      display: none;
    }

    .offline-badge.visible { display: block; }

    /* Botón config */
    .btn-config {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      padding: 6px 12px;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .btn-config:active { opacity: 0.7; }

    /* Historial rápido */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 120px;
      overflow-y: auto;
      padding: 0 4px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 12px;
    }

    .history-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .history-item.ok .history-dot   { background: var(--green); }
    .history-item.fail .history-dot { background: var(--red); }
    .history-item.warn .history-dot { background: var(--yellow); }

    .history-name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-time { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 10px; }

  </style>
</head>
<body>

<!-- Badge sin conexión -->
<div class="offline-badge" id="offline-badge">⚠ Sin conexión a internet</div>

<!-- ═══════════════════════════════════════════
     PANTALLA 1: CONFIGURACIÓN
════════════════════════════════════════════ -->
<div id="setup-screen">
  <div class="setup-logo">SISTEMA DE ACCESO</div>
  <div class="setup-title">CONTROL DE<br>ENTRADA</div>

  <div class="setup-card">
    <div>
      <div class="setup-label">URL del Apps Script</div>
      <input
        type="url"
        id="api-url-input"
        class="setup-input"
        placeholder="https://script.google.com/macros/s/.../exec"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
    </div>
    <div>
      <div class="setup-label">Nombre del evento (opcional)</div>
      <input
        type="text"
        id="event-name-input"
        class="setup-input"
        placeholder="Ej: Gala Anual 2025"
        autocomplete="off"
      >
    </div>
    <button class="btn-primary" onclick="guardarConfig()">INICIAR ESCÁNER</button>
  </div>

  <div class="setup-hint">
    Pega la URL que obtuviste al desplegar<br>el Apps Script como aplicación web.
  </div>
</div>

<!-- ═══════════════════════════════════════════
     PANTALLA 2: ESCÁNER PRINCIPAL
════════════════════════════════════════════ -->
<div id="scanner-screen">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-brand" id="event-name-display">CONTROL</div>
    </div>
    <div class="header-counter">
      <div class="counter-label">Accesos</div>
      <div class="counter-num" id="access-counter">0</div>
    </div>
    <button class="btn-config" onclick="volverConfig()">⚙</button>
  </div>

  <!-- Cámara -->
  <div class="camera-wrapper">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>

    <div class="camera-top-fade"></div>

    <div class="scan-frame">
      <div class="scan-corner tl"></div>
      <div class="scan-corner tr"></div>
      <div class="scan-corner bl"></div>
      <div class="scan-corner br"></div>
      <div class="scan-line"></div>
      <div class="scan-overlay-text">Apunta al código QR</div>
    </div>

    <div class="processing-badge" id="processing-badge">⟳ VALIDANDO...</div>
  </div>

  <!-- Panel de resultado + historial -->
  <div class="result-panel">

    <!-- Resultado actual -->
    <div class="result-card" id="result-card">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-info">
        <div class="result-name" id="result-name"></div>
        <div class="result-msg"  id="result-msg"></div>
        <div class="result-time" id="result-time"></div>
      </div>
    </div>

    <div class="result-placeholder" id="result-placeholder">
      <span>◈</span> Esperando escaneo
    </div>

    <!-- Historial rápido -->
    <div class="history-list" id="history-list" style="display:none; margin-top: 10px;"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     OVERLAY: RESULTADO FULLSCREEN
════════════════════════════════════════════ -->
<div id="result-fullscreen" onclick="cerrarFullscreen()">
  <div class="fs-icon" id="fs-icon"></div>
  <div class="fs-name" id="fs-name"></div>
  <div class="fs-msg"  id="fs-msg"></div>
  <div class="fs-dismiss">Toca para continuar</div>
  <div class="fs-progress" id="fs-progress"></div>
</div>


<script>
  // ═══════════════════════════════════════════
  // ESTADO GLOBAL
  // ═══════════════════════════════════════════
  let API_URL = '';
  let accessCount = 0;
  let isProcessing = false;
  let lastScanned = '';
  let lastScannedTime = 0;
  let historial = [];
  let dismissTimer = null;
  let stream = null;

  // ═══════════════════════════════════════════
  // CONFIGURACIÓN
  // ═══════════════════════════════════════════
  function guardarConfig() {
    const url = document.getElementById('api-url-input').value.trim();
    const nombre = document.getElementById('event-name-input').value.trim();

    if (!url || !url.startsWith('https://script.google.com')) {
      alert('Por favor ingresa una URL válida del Apps Script.\nDebe comenzar con: https://script.google.com');
      return;
    }

    API_URL = url;
    localStorage.setItem('evento_api_url', url);
    localStorage.setItem('evento_nombre', nombre);

    if (nombre) {
      document.getElementById('event-name-display').textContent = nombre.toUpperCase();
    }

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('scanner-screen').style.display = 'flex';

    iniciarCamara();
  }

  function volverConfig() {
    detenerCamara();
    document.getElementById('scanner-screen').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'flex';
  }

  // Recuperar config guardada
  window.addEventListener('load', () => {
    const url = localStorage.getItem('evento_api_url');
    const nombre = localStorage.getItem('evento_nombre');
    if (url) document.getElementById('api-url-input').value = url;
    if (nombre) document.getElementById('event-name-input').value = nombre;

    // Monitor de conexión
    window.addEventListener('online',  () => document.getElementById('offline-badge').classList.remove('visible'));
    window.addEventListener('offline', () => document.getElementById('offline-badge').classList.add('visible'));
    if (!navigator.onLine) document.getElementById('offline-badge').classList.add('visible');
  });

  // ═══════════════════════════════════════════
  // CÁMARA
  // ═══════════════════════════════════════════
  async function iniciarCamara() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'environment', // cámara trasera
          width:  { ideal: 1280 },
          height: { ideal: 720 }
        }
      });
      const video = document.getElementById('video');
      video.srcObject = stream;
      video.play();
      video.addEventListener('loadedmetadata', () => {
        requestAnimationFrame(escanearFrame);
      });
    } catch (err) {
      alert('No se pudo acceder a la cámara.\n\nAsegúrate de permitir el acceso a la cámara cuando el navegador lo solicite.\n\nError: ' + err.message);
    }
  }

  function detenerCamara() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
  }

  // ═══════════════════════════════════════════
  // LOOP DE ESCANEO QR
  // ═══════════════════════════════════════════
  function escanearFrame() {
    const video  = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    if (!stream) return; // cámara detenida

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.height = video.videoHeight;
      canvas.width  = video.videoWidth;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
      });

      if (code) {
        const ahora = Date.now();
        const esDiferente = code.data !== lastScanned;
        const hanPasado3s = (ahora - lastScannedTime) > 3000;

        // Procesar solo si es distinto o han pasado 3 segundos (para reintentos)
        if (!isProcessing && (esDiferente || hanPasado3s)) {
          lastScanned = code.data;
          lastScannedTime = ahora;
          procesarQR(code.data);
        }
      }
    }

    requestAnimationFrame(escanearFrame);
  }

  // ═══════════════════════════════════════════
  // VALIDAR QR CON EL SERVIDOR
  // ═══════════════════════════════════════════
  async function procesarQR(codigo) {
    if (isProcessing || !API_URL) return;
    isProcessing = true;

    document.getElementById('processing-badge').classList.add('visible');

    try {
      const url = `${API_URL}?accion=validar&codigo=${encodeURIComponent(codigo)}`;
      const resp = await fetch(url, { method: 'GET', mode: 'cors' });

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      const data = await resp.json();
      mostrarResultado(data);

    } catch (err) {
      mostrarResultado({
        exito: false,
        tipo: 'error',
        nombre: 'Error de conexión',
        mensaje: 'No se pudo conectar al servidor. Verifica el internet.'
      });
    } finally {
      document.getElementById('processing-badge').classList.remove('visible');
      // Esperar 2.5s antes de permitir nuevo escaneo
      setTimeout(() => { isProcessing = false; }, 2500);
    }
  }

  // ═══════════════════════════════════════════
  // MOSTRAR RESULTADO
  // ═══════════════════════════════════════════
  function mostrarResultado(data) {
    const tipo = data.tipo || (data.exito ? 'acceso_permitido' : 'no_encontrado');

    let icono, clase, claseFull, nombre, mensaje;

    switch (tipo) {
      case 'acceso_permitido':
        icono = '✅';
        clase = 'success';
        claseFull = 'success-fs';
        nombre = data.nombre || 'Acceso permitido';
        mensaje = '¡Bienvenido/a al evento!';
        accessCount++;
        document.getElementById('access-counter').textContent = accessCount;
        break;

      case 'ya_ingreso':
        icono = '⚠️';
        clase = 'warning';
        claseFull = 'warning-fs';
        nombre = data.nombre || 'Entrada duplicada';
        mensaje = `Ya ingresó — ${data.hora || 'anteriormente'}`;
        break;

      case 'no_encontrado':
        icono = '❌';
        clase = 'error';
        claseFull = 'error-fs';
        nombre = 'QR no válido';
        mensaje = 'Código no encontrado en el sistema';
        break;

      default: // error
        icono = '❌';
        clase = 'error';
        claseFull = 'error-fs';
        nombre = data.nombre || 'Error';
        mensaje = data.mensaje || 'Error desconocido';
    }

    const ahora = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    // Actualizar panel inferior
    const card = document.getElementById('result-card');
    card.className = `result-card ${clase} visible`;
    document.getElementById('result-icon').textContent = icono;
    document.getElementById('result-name').textContent = nombre;
    document.getElementById('result-msg').textContent  = mensaje;
    document.getElementById('result-time').textContent = ahora;
    document.getElementById('result-placeholder').style.display = 'none';

    // Vibración (Android)
    if (navigator.vibrate) {
      if (clase === 'success') navigator.vibrate([100, 50, 100]);
      else if (clase === 'warning') navigator.vibrate([200, 100, 200]);
      else navigator.vibrate(500);
    }

    // Mostrar fullscreen
    mostrarFullscreen(icono, nombre, mensaje, claseFull);

    // Agregar al historial
    agregarHistorial(clase, nombre, ahora);
  }

  function mostrarFullscreen(icono, nombre, mensaje, claseFull) {
    if (dismissTimer) clearTimeout(dismissTimer);

    const fs = document.getElementById('result-fullscreen');
    fs.className = `${claseFull} active`;
    document.getElementById('fs-icon').textContent = icono;
    document.getElementById('fs-name').textContent = nombre;
    document.getElementById('fs-msg').textContent  = mensaje;

    // Reiniciar barra de progreso
    const prog = document.getElementById('fs-progress');
    prog.style.animation = 'none';
    prog.offsetHeight; // reflow
    prog.style.animation = '';

    dismissTimer = setTimeout(cerrarFullscreen, 3000);
  }

  function cerrarFullscreen() {
    if (dismissTimer) clearTimeout(dismissTimer);
    document.getElementById('result-fullscreen').classList.remove('active');
  }

  // ═══════════════════════════════════════════
  // HISTORIAL
  // ═══════════════════════════════════════════
  function agregarHistorial(clase, nombre, hora) {
    historial.unshift({ clase, nombre, hora });
    if (historial.length > 8) historial.pop();

    const lista = document.getElementById('history-list');
    lista.style.display = 'flex';

    const claseItem = clase === 'success' ? 'ok' : clase === 'warning' ? 'warn' : 'fail';
    lista.innerHTML = historial.map(h => `
      <div class="history-item ${h.clase === 'success' ? 'ok' : h.clase === 'warning' ? 'warn' : 'fail'}">
        <div class="history-dot"></div>
        <div class="history-name">${h.nombre}</div>
        <div class="history-time">${h.hora}</div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
