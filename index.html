  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap');

    :root {
      --black:      #000000;
      --purple:     #74079C;
      --purple-dim: #3d0452;
      --purple-glow:#a020d4;
      --green:      #169C07;
      --green-dim:  #0a5204;
      --green-glow: #20d408;
      --text:       #f0f0f0;
      --muted:      #666;
      --surface:    #0d0d0d;
      --border:     #1a1a1a;

      --ok-bg:      #031a02;
      --ok-color:   #20d408;
      --ok-border:  rgba(22,156,7,0.4);

      --fail-bg:    #1a0205;
      --fail-color: #ff3355;
      --fail-border:rgba(255,51,85,0.4);

      --warn-bg:    #1a0d00;
      --warn-color: #ff9500;
      --warn-border:rgba(255,149,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ══════════════════════════════════════
       FONDO TEXTURIZADO CON PATRÓN DEPORTIVO
    ══════════════════════════════════════ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(116,7,156,0.03) 40px,
          rgba(116,7,156,0.03) 41px
        ),
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 40px,
          rgba(22,156,7,0.03) 40px,
          rgba(22,156,7,0.03) 41px
        );
      pointer-events: none;
      z-index: 0;
    }

    /* ══════════════════════════════════════
       PANTALLA DE CONFIGURACIÓN
    ══════════════════════════════════════ */
    #setup-screen {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 32px 24px;
      gap: 20px;
    }

    .setup-shield {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(116,7,156,0.6));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .setup-team {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 5px;
      text-align: center;
      line-height: 1;
      background: linear-gradient(135deg, #169C07, #74079C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .setup-subtitle {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-top: -12px;
    }

    .setup-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .setup-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--green), var(--purple));
    }

    .setup-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .setup-input {
      width: 100%;
      background: #080808;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .setup-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 2px rgba(116,7,156,0.2);
    }

    .setup-input::placeholder { color: #333; }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--purple), var(--purple-dim));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 4px;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1));
    }

    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

    /* ══════════════════════════════════════
       PANTALLA PRINCIPAL ESCÁNER
    ══════════════════════════════════════ */
    #scanner-screen {
      display: none;
      flex-direction: column;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    /* Header deportivo */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--black);
      border-bottom: 1px solid #111;
      flex-shrink: 0;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--green), var(--purple));
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-shield {
      width: 38px;
      height: 38px;
      object-fit: contain;
      filter: drop-shadow(0 0 6px rgba(116,7,156,0.5));
    }

    .header-titles {
      display: flex;
      flex-direction: column;
    }

    .header-team {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      line-height: 1;
      background: linear-gradient(90deg, var(--green), var(--purple-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-sub {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .counter-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 4px 12px;
    }

    .counter-label {
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .counter-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--green);
      line-height: 1;
      text-shadow: 0 0 10px rgba(22,156,7,0.5);
    }

    .btn-config {
      background: none;
      border: 1px solid #222;
      border-radius: 6px;
      color: var(--muted);
      padding: 6px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    /* Visor cámara */
    .camera-wrapper {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #canvas { display: none; }

    /* Degradados sobre cámara */
    .cam-fade-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 100px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
      pointer-events: none;
    }

    .cam-fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      pointer-events: none;
    }

    /* Marco de escaneo deportivo */
    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      width: min(62vw, 230px);
      height: min(62vw, 230px);
    }

    .scan-corner {
      position: absolute;
      width: 24px;
      height: 24px;
    }

    .scan-corner::before, .scan-corner::after {
      content: '';
      position: absolute;
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
    }

    .scan-corner.tl::before { top:0; left:0; width:100%; height:3px; border-radius:2px 0 0 0; }
    .scan-corner.tl::after  { top:0; left:0; width:3px; height:100%; border-radius:2px 0 0 0; }
    .scan-corner.tr::before { top:0; right:0; width:100%; height:3px; border-radius:0 2px 0 0; }
    .scan-corner.tr::after  { top:0; right:0; width:3px; height:100%; border-radius:0 2px 0 0; }
    .scan-corner.bl::before { bottom:0; left:0; width:100%; height:3px; border-radius:0 0 0 2px; }
    .scan-corner.bl::after  { bottom:0; left:0; width:3px; height:100%; border-radius:0 0 0 2px; }
    .scan-corner.br::before { bottom:0; right:0; width:100%; height:3px; border-radius:0 0 2px 0; }
    .scan-corner.br::after  { bottom:0; right:0; width:3px; height:100%; border-radius:0 0 2px 0; }

    .scan-corner.tl { top:0; left:0; }
    .scan-corner.tr { top:0; right:0; }
    .scan-corner.bl { bottom:0; left:0; }
    .scan-corner.br { bottom:0; right:0; }

    /* Línea de escaneo animada */
    .scan-line {
      position: absolute;
      left: 8px; right: 8px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--purple-glow), var(--green-glow), var(--purple-glow), transparent);
      top: 0;
      animation: scanline 2s ease-in-out infinite;
      filter: blur(0.5px);
    }

    @keyframes scanline {
      0%, 100% { top: 8px; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      50% { top: calc(100% - 10px); }
    }

    /* Mini escudo centrado dentro del frame */
    .scan-center-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
      object-fit: contain;
      opacity: 0.15;
    }

    .scan-hint {
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      white-space: nowrap;
      font-family: 'Barlow Condensed', sans-serif;
    }

    /* Badge procesando */
    .processing-badge {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(116,7,156,0.25);
      border: 1px solid rgba(116,7,156,0.5);
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--purple-glow);
      display: none;
      white-space: nowrap;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
    }

    .processing-badge.visible { display: block; }

    /* ══════════════════════════════════════
       PANEL RESULTADO
    ══════════════════════════════════════ */
    .result-panel {
      flex-shrink: 0;
      padding: 0 14px 14px;
      background: var(--black);
      border-top: 1px solid #111;
      position: relative;
    }

    .result-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--purple), var(--green));
    }

    .result-card {
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 14px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .result-card.visible { opacity: 1; transform: translateY(0); }
    .result-card.success { background: var(--ok-bg); border: 1px solid var(--ok-border); }
    .result-card.error   { background: var(--fail-bg); border: 1px solid var(--fail-border); }
    .result-card.warning { background: var(--warn-bg); border: 1px solid var(--warn-border); }

    .result-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .result-card.success .result-icon { background: rgba(22,156,7,0.15); box-shadow: 0 0 14px rgba(22,156,7,0.2); }
    .result-card.error   .result-icon { background: rgba(255,51,85,0.15); box-shadow: 0 0 14px rgba(255,51,85,0.2); }
    .result-card.warning .result-icon { background: rgba(255,149,0,0.15); box-shadow: 0 0 14px rgba(255,149,0,0.2); }

    .result-info { flex: 1; min-width: 0; }

    .result-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 1px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-msg { font-size: 13px; margin-top: 2px; font-weight: 600; letter-spacing: 0.5px; }
    .result-card.success .result-msg { color: var(--ok-color); }
    .result-card.error   .result-msg { color: var(--fail-color); }
    .result-card.warning .result-msg { color: var(--warn-color); }

    .result-time { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

    .result-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      color: #2a2a2a;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      gap: 8px;
      margin-top: 14px;
    }

    /* Historial */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 110px;
      overflow-y: auto;
      margin-top: 10px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      background: #080808;
      border-radius: 6px;
      border: 1px solid #141414;
      font-size: 12px;
    }

    .history-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .history-item.ok .history-dot   { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .history-item.fail .history-dot { background: var(--fail-color); }
    .history-item.warn .history-dot { background: var(--warn-color); }
    .history-name { flex: 1; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
    .history-time { color: #333; font-family: 'JetBrains Mono', monospace; font-size: 10px; }

    /* ══════════════════════════════════════
       FULLSCREEN RESULTADO
    ══════════════════════════════════════ */
    #result-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 32px;
      transform: scale(0.92);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
    }

    #result-fullscreen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 30px,
          rgba(255,255,255,0.02) 30px,
          rgba(255,255,255,0.02) 31px
        );
    }

    #result-fullscreen.active {
      transform: scale(1);
      opacity: 1;
      pointer-events: all;
    }

    #result-fullscreen.success-fs { background: #010f01; }
    #result-fullscreen.error-fs   { background: #100108; }
    #result-fullscreen.warning-fs { background: #100800; }

    .fs-shield {
      width: 60px;
      height: 60px;
      object-fit: contain;
      opacity: 0.6;
      margin-bottom: 4px;
    }

    .fs-icon {
      font-size: 80px;
      line-height: 1;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      filter: drop-shadow(0 0 20px currentColor);
    }

    @keyframes popIn {
      from { transform: scale(0) rotate(-10deg); }
      to   { transform: scale(1) rotate(0deg); }
    }

    .fs-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 3px;
      text-align: center;
      color: var(--text);
    }

    .fs-msg {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-align: center;
      text-transform: uppercase;
    }

    #result-fullscreen.success-fs .fs-msg { color: var(--ok-color); text-shadow: 0 0 20px var(--ok-color); }
    #result-fullscreen.error-fs   .fs-msg { color: var(--fail-color); text-shadow: 0 0 20px var(--fail-color); }
    #result-fullscreen.warning-fs .fs-msg { color: var(--warn-color); text-shadow: 0 0 20px var(--warn-color); }

    .fs-dismiss {
      font-size: 10px;
      color: #333;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .fs-glow-ring {
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      opacity: 0.08;
      animation: pulse-ring 2s ease-in-out infinite;
    }

    #result-fullscreen.success-fs .fs-glow-ring { background: radial-gradient(circle, var(--green) 0%, transparent 70%); }
    #result-fullscreen.error-fs   .fs-glow-ring { background: radial-gradient(circle, var(--fail-color) 0%, transparent 70%); }
    #result-fullscreen.warning-fs .fs-glow-ring { background: radial-gradient(circle, var(--warn-color) 0%, transparent 70%); }

    @keyframes pulse-ring {
      0%, 100% { transform: scale(0.8); opacity: 0.06; }
      50% { transform: scale(1.2); opacity: 0.12; }
    }

    .fs-progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      animation: prog 3s linear forwards;
    }

    #result-fullscreen.success-fs .fs-progress { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #result-fullscreen.error-fs   .fs-progress { background: var(--fail-color); }
    #result-fullscreen.warning-fs .fs-progress { background: var(--warn-color); }

    @keyframes prog { from { width: 100%; } to { width: 0%; } }

    /* Sin conexión */
    .offline-badge {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--fail-color);
      color: white;
      text-align: center;
      padding: 6px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 200;
      display: none;
      font-weight: 700;
    }

    .offline-badge.visible { display: block; }
  </style>
</head>

  <div class="fs-icon" id="fs-icon"></div>
  <div class="fs-name" id="fs-name"></div>
  <div class="fs-msg"  id="fs-msg"></div>
  <div class="fs-dismiss">Toca para continuar</div>
  <div class="fs-progress" id="fs-progress"></div>
</div>

<script>
  let API_URL = '';
  let accessCount = 0;
  let isProcessing = false;
  let lastScanned = '';
  let lastScannedTime = 0;
  let historial = [];
  let dismissTimer = null;
  let stream = null;

  function guardarConfig() {
    const url = document.getElementById('api-url-input').value.trim();
    const nombre = document.getElementById('event-name-input').value.trim();

    if (!url || !url.startsWith('https://script.google.com')) {
      alert('Por favor ingresa una URL válida del Apps Script.\nDebe comenzar con: https://script.google.com');
      return;
    }

    API_URL = url;
    localStorage.setItem('evento_api_url', url);
    localStorage.setItem('evento_nombre', nombre);

    if (nombre) {
      document.getElementById('event-name-display').textContent = nombre.toUpperCase();
    }

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('scanner-screen').style.display = 'flex';
    iniciarCamara();
  }

  function volverConfig() {
    detenerCamara();
    document.getElementById('scanner-screen').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'flex';
  }

  window.addEventListener('load', () => {
    const url = localStorage.getItem('evento_api_url');
    const nombre = localStorage.getItem('evento_nombre');
    if (url) document.getElementById('api-url-input').value = url;
    if (nombre) document.getElementById('event-name-input').value = nombre;
    window.addEventListener('online',  () => document.getElementById('offline-badge').classList.remove('visible'));
    window.addEventListener('offline', () => document.getElementById('offline-badge').classList.add('visible'));
    if (!navigator.onLine) document.getElementById('offline-badge').classList.add('visible');
  });

  let codeReader = null;

  async function iniciarCamara() {
    try {
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      codeReader = new ZXing.BrowserQRCodeReader(hints);
      const video = document.getElementById('video');
      await codeReader.decodeFromConstraints(
        { video: { facingMode: 'environment' } },
        video,
        (result, err) => {
          if (result) {
            const codigo = result.getText().trim();
            const ahora = Date.now();
            const esDiferente = codigo !== lastScanned;
            const hanPasado3s = (ahora - lastScannedTime) > 3000;
            if (!isProcessing && codigo && (esDiferente || hanPasado3s)) {
              lastScanned = codigo;
              lastScannedTime = ahora;
              procesarQR(codigo);
            }
          }
        }
      );
    } catch (err) {
      alert('No se pudo acceder a la cámara.\n\nPermite el acceso a la cámara en Configuración > Safari > Cámara.\n\nError: ' + err.message);
    }
  }

  function detenerCamara() {
    if (codeReader) { codeReader.reset(); codeReader = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }

  async function procesarQR(codigo) {
    if (isProcessing || !API_URL) return;
    isProcessing = true;
    document.getElementById('processing-badge').classList.add('visible');
    try {
      const url = `${API_URL}?accion=validar&codigo=${encodeURIComponent(codigo)}`;
      const resp = await fetch(url, { method: 'GET', mode: 'cors' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      mostrarResultado(data);
    } catch (err) {
      mostrarResultado({ exito: false, tipo: 'error', nombre: 'Error de conexión', mensaje: 'No se pudo conectar al servidor.' });
    } finally {
      document.getElementById('processing-badge').classList.remove('visible');
      setTimeout(() => { isProcessing = false; }, 2500);
    }
  }

  function mostrarResultado(data) {
    const tipo = data.tipo || (data.exito ? 'acceso_permitido' : 'no_encontrado');
    let icono, clase, claseFull, nombre, mensaje;

    switch (tipo) {
      case 'acceso_permitido':
        icono = '✅'; clase = 'success'; claseFull = 'success-fs';
        nombre = data.nombre || 'Acceso permitido';
        mensaje = '¡BIENVENIDO AL EVENTO!';
        accessCount++;
        document.getElementById('access-counter').textContent = accessCount;
        break;
      case 'ya_ingreso':
        icono = '⚠️'; clase = 'warning'; claseFull = 'warning-fs';
        nombre = data.nombre || 'Entrada duplicada';
        mensaje = `YA INGRESÓ — ${data.hora || 'ANTERIORMENTE'}`;
        break;
      case 'no_encontrado':
        icono = '❌'; clase = 'error'; claseFull = 'error-fs';
        nombre = 'QR NO VÁLIDO';
        mensaje = 'CÓDIGO NO REGISTRADO';
        break;
      default:
        icono = '❌'; clase = 'error'; claseFull = 'error-fs';
        nombre = data.nombre || 'ERROR';
        mensaje = data.mensaje || 'ERROR DESCONOCIDO';
    }

    const ahora = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const card = document.getElementById('result-card');
    card.className = `result-card ${clase} visible`;
    document.getElementById('result-icon').textContent = icono;
    document.getElementById('result-name').textContent = nombre;
    document.getElementById('result-msg').textContent  = mensaje;
    document.getElementById('result-time').textContent = ahora;
    document.getElementById('result-placeholder').style.display = 'none';

    if (navigator.vibrate) {
      if (clase === 'success') navigator.vibrate([100, 50, 100]);
      else if (clase === 'warning') navigator.vibrate([200, 100, 200]);
      else navigator.vibrate(500);
    }

    mostrarFullscreen(icono, nombre, mensaje, claseFull);
    agregarHistorial(clase, nombre, ahora);
  }

  function mostrarFullscreen(icono, nombre, mensaje, claseFull) {
    if (dismissTimer) clearTimeout(dismissTimer);
    const fs = document.getElementById('result-fullscreen');
    fs.className = `${claseFull} active`;
    document.getElementById('fs-icon').textContent = icono;
    document.getElementById('fs-name').textContent = nombre;
    document.getElementById('fs-msg').textContent  = mensaje;
    const prog = document.getElementById('fs-progress');
    prog.style.animation = 'none';
    prog.offsetHeight;
    prog.style.animation = '';
    dismissTimer = setTimeout(cerrarFullscreen, 3000);
  }

  function cerrarFullscreen() {
    if (dismissTimer) clearTimeout(dismissTimer);
    document.getElementById('result-fullscreen').classList.remove('active');
  }

  function agregarHistorial(clase, nombre, hora) {
    historial.unshift({ clase, nombre, hora });
    if (historial.length > 8) historial.pop();
    const lista = document.getElementById('history-list');
    lista.style.display = 'flex';
    lista.innerHTML = historial.map(h => `
      <div class="history-item ${h.clase === 'success' ? 'ok' : h.clase === 'warning' ? 'warn' : 'fail'}">
        <div class="history-dot"></div>
        <div class="history-name">${h.nombre}</div>
        <div class="history-time">${h.hora}</div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
